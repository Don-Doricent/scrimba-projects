<html>
    <head>
       <link rel="stylesheet" href="index.css">
    </head>
    <body>

        <section class="app-container">
    
        <section class="header">
            <img class="headerImg" src="./restaurantOrderingApp/images/burger-soda-fast-food-header-banner-template-94802990.webp" alt="headerImage">
            <h1>Don's Diner</h1>
            <h2>The best burgers and pizza in town</h2>
        </section>

        <section id="menu-container"></section>
        <section id="order-container"></section>


    <div id="modal" class="modal hidden">
        <form id="payment-form">
            <h2>Enter Card Details</h2>

            <input
                id="name-input" 
                type="text"
                placeholder="Enter your name"

            >

            <input type="text"
                placeholder="Enter card number"
                required
            >

            <input type="text"
                placeholder="Enter CVV"
                required
            >
        
        <button type="submit">
            Pay
        </button>


        </form>
    </div>

	<script src="index.js" type="module"></script>
    </body>
</html>
