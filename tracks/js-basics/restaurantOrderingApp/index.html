<html>
    <head>
       <link rel="stylesheet" href="index.css">
    </head>
    <body>
    
        <section class="header">
            <img src="./restaurantOrderingApp/images/burger-soda-fast-food-header-banner-template-94802990.webp" alt="headerImage">
            <h1>Don's Diner</h1>
            <h2>The best burgers and pizza in town</h2>
        </section>

        <section class="foodItem">

            <img src="#" alt="Pizza Image">

            <div class="food-info">
                <h2>Pizza</h2>
                <p>Pepperoni, Mushroom, Sausage</p>
                <h2 class="price">$14</h2>
            </div>

            <button class="add-btn">+</button>

        </section>

        <section class="foodItem">

            <img src="#" alt="Burger Image">
            <div class="food-info">
                <h2>Hamburger</h2>
                <p>Beef, Cheese, Lettuce</p>
                <h2 class="price">$12</h2>
            </div>
            <button class="add-btn">+</button>
        </section>

        <section class="foodItem">
            
            <img src="#" alt="Beer Image">

            <div class="food-info">
                <h2>Beer</h2>
                <p>Grain, Hops, Yeast, Water</p>
                <h2 class="price">$12</h2>
            </div>

            <button class="add-btn">+</button>
        </section>

	<script src="index.js" type="module"></script>
    </body>
</html>
